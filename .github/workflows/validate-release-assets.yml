name: Validate release assets

on:
  workflow_dispatch:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check release helper syntax
        run: python -m py_compile scripts/prepare_release_assets.py
      - name: Validate schema docs exist
        run: |
          test -f README.md
          test -f DATA_SOURCES.md
          test -f NOTICE.md
          test -f RELEASE_SCHEMA.md
